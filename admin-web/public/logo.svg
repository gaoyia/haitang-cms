<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#e63946;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#fff5f5;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.9" />
    </radialGradient>
  </defs>
  
  <!-- Refined Branch - Elegant, continuous line supporting from beneath -->
  <path d="M30,170 C60,165 90,140 100,100 C105,80 120,60 150,45" fill="none" stroke="#5d4037" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  <path d="M100,100 Q125,115 155,125" fill="none" stroke="#5d4037" stroke-width="3" stroke-linecap="round" opacity="0.4" />

  <!-- Main Flower - Exactly 5 petals, centered on branch junction -->
  <g transform="translate(100, 95)">
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(0)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(72)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(144)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(216)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(288)" />
    <circle cx="0" cy="0" r="5" fill="#fbc02d" /> <!-- Stamen -->
  </g>

  <!-- Secondary Flower - Now with its own stamen core -->
  <g transform="translate(145, 115) rotate(20) scale(0.65)">
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(0)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(72)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(144)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(216)" />
    <ellipse cx="0" cy="-28" rx="18" ry="28" fill="url(#petalGrad)" transform="rotate(288)" />
    <circle cx="0" cy="0" r="5" fill="#fbc02d" /> <!-- Added Stamen -->
  </g>
</svg>